name: Test cache-dependency-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create packages.lock.json fixture
        run: |
          mkdir -p $GITHUB_WORKSPACE/myapp
          cat > $GITHUB_WORKSPACE/myapp/packages.lock.json <<'EOF'
          {
            "version": 1,
            "dependencies": {
              "net8.0": {}
            }
          }
          EOF
      - id: action
        uses: .
        with:
          dotnet-version: '8.0'
          cache: true
          cache-dependency-path: myapp/packages.lock.json
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.dotnet-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected dotnet-version output to be non-empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert dotnet is installed
        run: |
          dotnet --version
          echo "PASS: dotnet is installed"
