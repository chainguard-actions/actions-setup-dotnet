name: Test global-json-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          global-json-file: 'actions/hardened/actions--setup-dotnet/v5.2.0/tests/fixtures/global.json'
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.dotnet-version }}
        run: |
          echo "actual dotnet-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: dotnet-version output was empty"
            exit 1
          fi
          echo "PASS: dotnet-version output is set to $ACTUAL"
      - name: Assert dotnet is available
        run: |
          dotnet --version
          echo "PASS: dotnet is available"
