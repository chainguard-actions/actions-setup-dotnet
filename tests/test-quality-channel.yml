name: Test dotnet-quality and dotnet-channel
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dotnet-version: 'latest'
          dotnet-quality: 'ga'
          dotnet-channel: 'LTS'
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.dotnet-version }}
        run: |
          echo "actual dotnet-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected dotnet-version output to be non-empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert dotnet is available
        run: |
          dotnet --version
          echo "PASS: dotnet is available"
