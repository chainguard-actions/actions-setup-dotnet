name: Test basic dotnet setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          dotnet-version: '8.0'
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.dotnet-version }}
        run: |
          echo "actual dotnet-version output: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: dotnet-version output was empty"
            exit 1
          fi
          echo "PASS: dotnet-version output is '$ACTUAL'"
      - name: Assert dotnet is installed and functional
        run: |
          echo "Running: dotnet --version"
          VERSION=$(dotnet --version)
          echo "dotnet --version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: dotnet --version returned empty"
            exit 1
          fi
          echo "PASS: dotnet is installed, version=$VERSION"
