name: Test dotnet setup with cache inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dotnet-version: '8.0'
          cache: true
          cache-dependency-path: 'actions/hardened/actions--setup-dotnet/v5.2.0/tests/fixtures/packages.lock.json'
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.dotnet-version }}
        run: |
          echo "actual dotnet-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: dotnet-version output was empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert cache-hit output is present
        env:
          CACHE_HIT: ${{ steps.action.outputs.cache-hit }}
        run: |
          echo "cache-hit: $CACHE_HIT"
          echo "PASS: cache-hit output checked"
      - name: Assert dotnet is installed
        run: |
          dotnet --version
          echo "PASS: dotnet is installed"
