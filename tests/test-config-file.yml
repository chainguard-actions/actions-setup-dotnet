name: Test config-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create custom NuGet.config
        run: |
          mkdir -p $GITHUB_WORKSPACE/nuget-config
          cat > $GITHUB_WORKSPACE/nuget-config/NuGet.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
          </configuration>
          EOF
      - id: action
        uses: .
        with:
          dotnet-version: '8.0'
          config-file: ${{ github.workspace }}/nuget-config/NuGet.config
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.dotnet-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected dotnet-version output to be non-empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert dotnet is installed
        run: |
          dotnet --version
          echo "PASS: dotnet is installed"
