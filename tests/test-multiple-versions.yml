name: Test multiple dotnet versions setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          dotnet-version: |
            6.0
            8.0
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.dotnet-version }}
        run: |
          echo "actual dotnet-version output: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: dotnet-version output was empty"
            exit 1
          fi
          echo "PASS: dotnet-version output is '$ACTUAL'"
      - name: Assert dotnet 8.0 is available
        run: |
          echo "Checking dotnet 8.0..."
          dotnet --list-sdks
          if ! dotnet --list-sdks | grep -q '^8\.'; then
            echo "FAIL: dotnet 8.0 SDK not found in installed SDKs"
            exit 1
          fi
          echo "PASS: dotnet 8.0 SDK is installed"
      - name: Assert dotnet 6.0 is available
        run: |
          echo "Checking dotnet 6.0..."
          dotnet --list-sdks
          if ! dotnet --list-sdks | grep -q '^6\.'; then
            echo "FAIL: dotnet 6.0 SDK not found in installed SDKs"
            exit 1
          fi
          echo "PASS: dotnet 6.0 SDK is installed"
