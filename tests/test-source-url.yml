name: Test source-url and owner inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NUGET_AUTH_TOKEN: fake-token-for-testing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dotnet-version: '8.0'
          source-url: https://nuget.pkg.github.com/actions/index.json
          owner: actions
        env:
          NUGET_AUTH_TOKEN: fake-token-for-testing
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.dotnet-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected dotnet-version output to be non-empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert dotnet is installed
        run: |
          dotnet --version
          echo "PASS: dotnet is installed"
