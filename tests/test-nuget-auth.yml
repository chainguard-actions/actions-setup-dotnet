name: Test source-url, owner, and config-file inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NUGET_AUTH_TOKEN: fake-token-for-testing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dotnet-version: '8.0'
          source-url: 'https://nuget.pkg.github.com/actions/index.json'
          owner: 'actions'
          config-file: 'actions/hardened/actions--setup-dotnet/v5.2.0/tests/fixtures/NuGet.config'
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.dotnet-version }}
        run: |
          echo "actual dotnet-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: dotnet-version output was empty"
            exit 1
          fi
          echo "PASS: dotnet-version output is set to $ACTUAL"
      - name: Assert dotnet is available
        run: |
          dotnet --version
          echo "PASS: dotnet is available"
