name: Test workloads input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dotnet-version: '8.0'
          workloads: wasm-tools
      - name: Assert dotnet-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.dotnet-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected dotnet-version output to be non-empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert dotnet is installed
        run: |
          dotnet --version
          echo "PASS: dotnet is installed"
      - name: Assert wasm-tools workload is installed
        run: |
          dotnet workload list | grep -i wasm-tools || {
            echo "FAIL: wasm-tools workload not found"
            exit 1
          }
          echo "PASS: wasm-tools workload is installed"
